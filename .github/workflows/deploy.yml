name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck
        env:
          APP_ENV: production
          TURSO_DATABASE_URL: file:./data/db.sqlite
          WORKOS_CLIENT_ID: ci-placeholder
          WORKOS_API_KEY: ci-placeholder
          WORKOS_REDIRECT_URI: http://localhost:3000/callback
          WORKOS_COOKIE_PASSWORD: ci-placeholder-32-chars-padded-000
          SENTRY_ORG: ci-placeholder
          SENTRY_PROJECT: ci-placeholder
          SENTRY_AUTH_TOKEN: ci-placeholder
          VITE_APP_ENV: production

      - name: Lint
        run: pnpm lint

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure custom domain certificate (idempotent)
        if: vars.FLY_CUSTOM_DOMAIN != ''
        run: flyctl certs add "${{ vars.FLY_CUSTOM_DOMAIN }}" || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: |
          flyctl ssh console \
            --app risk-manager \
            --command "node --experimental-strip-types app/server/migrate.ts"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

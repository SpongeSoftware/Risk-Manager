name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create release & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      FLY_APP: risk-manager

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          MISSING=()
          for var in TURSO_DATABASE_URL TURSO_AUTH_TOKEN WORKOS_CLIENT_ID WORKOS_API_KEY \
                      WORKOS_REDIRECT_URI WORKOS_COOKIE_PASSWORD BOOTSTRAP_ADMIN_EMAIL FLY_API_TOKEN; do
            [ -z "${!var}" ] && MISSING+=("$var")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_REDIRECT_URI: ${{ secrets.WORKOS_REDIRECT_URI }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Resolve version bump
        id: bump
        run: |
          BUMP="${{ inputs.version_bump }}"
          echo "type=${BUMP:-patch}" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Previous version: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin "${{ steps.version.outputs.new_version }}"

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_version }}" \
            --title "${{ steps.version.outputs.new_version }}" \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.previous_version }}"

      - name: Append direct commits to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RANGE="${{ steps.version.outputs.previous_version }}..${{ steps.version.outputs.new_version }}"
          DIRECT_COMMITS=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)")

          if [ -n "$DIRECT_COMMITS" ]; then
            CURRENT_NOTES=$(gh release view "${{ steps.version.outputs.new_version }}" --json body -q .body)
            UPDATED_NOTES=$(printf '%s\n\n## Direct Commits\n%s' "$CURRENT_NOTES" "$DIRECT_COMMITS")
            gh release edit "${{ steps.version.outputs.new_version }}" --notes "$UPDATED_NOTES"
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Sync secrets to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_REDIRECT_URI: ${{ secrets.WORKOS_REDIRECT_URI }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          printf '%s\n' \
            "APP_ENV=production" \
            "VITE_APP_ENV=production" \
            "TURSO_DATABASE_URL=$TURSO_DATABASE_URL" \
            "TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN" \
            "WORKOS_CLIENT_ID=$WORKOS_CLIENT_ID" \
            "WORKOS_API_KEY=$WORKOS_API_KEY" \
            "WORKOS_REDIRECT_URI=$WORKOS_REDIRECT_URI" \
            "WORKOS_COOKIE_PASSWORD=$WORKOS_COOKIE_PASSWORD" \
            "BOOTSTRAP_ADMIN_EMAIL=$BOOTSTRAP_ADMIN_EMAIL" \
            "SENTRY_DSN=$SENTRY_DSN" \
            "SENTRY_ORG=$SENTRY_ORG" \
            "SENTRY_PROJECT=$SENTRY_PROJECT" \
          | flyctl secrets import

      - name: Capture current release for rollback
        id: rollback
        run: |
          IMAGE=$(flyctl releases list --app "$FLY_APP" --json 2>/dev/null \
            | jq -r '.[0].ImageRef // ""')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --image-label "${{ steps.version.outputs.new_version }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rollback deployment on failure
        if: failure() && steps.rollback.outputs.image != ''
        run: flyctl deploy --image "${{ steps.rollback.outputs.image }}" --app "$FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure custom domain certificate (idempotent)
        if: vars.FLY_CUSTOM_DOMAIN != ''
        continue-on-error: true
        run: flyctl certs add "${{ vars.FLY_CUSTOM_DOMAIN }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: |
          flyctl ssh console \
            --app "$FLY_APP" \
            --command "node --experimental-strip-types app/server/migrate.ts"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          artifact-name: sbom-${{ steps.version.outputs.new_version }}.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json
          upload-release-assets: true
          release-name: ${{ steps.version.outputs.new_version }}
